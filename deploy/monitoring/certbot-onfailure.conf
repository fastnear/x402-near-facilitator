# Drop-in for certbot.service (install at
# /etc/systemd/system/certbot.service.d/x402-near-onfailure.conf) so a
# failed renewal run raises an SNS alert instead of failing silently.
# Renewal-lag and expiry are additionally covered by the
# CertDaysRemaining metric and its alarm.
[Unit]
OnFailure=x402-near-alert@%n.service
