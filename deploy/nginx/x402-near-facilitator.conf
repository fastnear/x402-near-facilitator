# Cloudflare must use Full (strict). Install the certificate and root-only key
# outside the repository before enabling this site.

upstream x402_near_mainnet {
    server 127.0.0.1:8402;
    keepalive 16;
}

upstream x402_near_testnet {
    server 127.0.0.1:8403;
    keepalive 16;
}

# Refuse unknown Host headers and TLS SNI names instead of allowing Nginx to
# route them to the first configured facilitator virtual host.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate /etc/ssl/certs/x402.fastnear.com-origin.pem;
    ssl_certificate_key /etc/ssl/private/x402.fastnear.com-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name x402.fastnear.com;
    return 308 https://x402.fastnear.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name test.x402.fastnear.com;
    return 308 https://test.x402.fastnear.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name x402.fastnear.com;
    include /etc/nginx/snippets/x402-near-cloudflare-only.conf;

    ssl_certificate /etc/ssl/certs/x402.fastnear.com-origin.pem;
    ssl_certificate_key /etc/ssl/private/x402.fastnear.com-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:x402_near_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    access_log /var/log/nginx/x402-near-facilitator.access.log combined;
    error_log /var/log/nginx/x402-near-facilitator.error.log warn;
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    error_page 413 = @mainnet_payload_too_large;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location @mainnet_payload_too_large {
        internal;
        default_type application/json;
        return 413 '{"error":{"code":"request_too_large","message":"request body exceeds 64 KiB"}}';
    }

    location = /settle {
        limit_except POST { deny all; }
        proxy_pass http://x402_near_mainnet;
        proxy_read_timeout 65s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location = /verify {
        limit_except POST { deny all; }
        proxy_pass http://x402_near_mainnet;
        proxy_read_timeout 20s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location ~ ^/(supported|healthz|readyz)$ {
        limit_except GET { deny all; }
        proxy_pass http://x402_near_mainnet;
        proxy_read_timeout 10s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.x402.fastnear.com;
    include /etc/nginx/snippets/x402-near-cloudflare-only.conf;

    ssl_certificate /etc/ssl/certs/x402.fastnear.com-origin.pem;
    ssl_certificate_key /etc/ssl/private/x402.fastnear.com-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:x402_near_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    access_log /var/log/nginx/x402-near-facilitator.access.log combined;
    error_log /var/log/nginx/x402-near-facilitator.error.log warn;
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    error_page 413 = @testnet_payload_too_large;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location @testnet_payload_too_large {
        internal;
        default_type application/json;
        return 413 '{"error":{"code":"request_too_large","message":"request body exceeds 64 KiB"}}';
    }

    location = /settle {
        limit_except POST { deny all; }
        proxy_pass http://x402_near_testnet;
        proxy_read_timeout 65s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location = /verify {
        limit_except POST { deny all; }
        proxy_pass http://x402_near_testnet;
        proxy_read_timeout 20s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location ~ ^/(supported|healthz|readyz)$ {
        limit_except GET { deny all; }
        proxy_pass http://x402_near_testnet;
        proxy_read_timeout 10s;
        include /etc/nginx/snippets/x402-near-proxy.conf;
    }

    location / {
        return 404;
    }
}
