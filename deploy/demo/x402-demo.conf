# Demo x402 resource workload: the packaged example resource server from
# examples/resource-server, deployed against the production facilitator.
# Nginx terminates public TLS directly. Issue one certificate covering
# exactly both demo hostnames into the
# /etc/letsencrypt/live/x402-demo.mikedotexe.com lineage before enabling
# this site. Unknown hostnames are refused by the default-server blocks in
# x402-near-facilitator.conf.

upstream x402_demo_testnet {
    server 127.0.0.1:4021;
    keepalive 8;
}

upstream x402_demo_mainnet {
    server 127.0.0.1:4022;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name x402-demo.mikedotexe.com;

    location /.well-known/acme-challenge/ {
        root /var/www/x402-near-acme;
        default_type text/plain;
    }

    location / {
        return 308 https://x402-demo.mikedotexe.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name x402-demo-test.mikedotexe.com;

    location /.well-known/acme-challenge/ {
        root /var/www/x402-near-acme;
        default_type text/plain;
    }

    location / {
        return 308 https://x402-demo-test.mikedotexe.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name x402-demo.mikedotexe.com;

    ssl_certificate /etc/letsencrypt/live/x402-demo.mikedotexe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x402-demo.mikedotexe.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:x402_demo_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    access_log /var/log/nginx/x402-demo.access.log combined;
    error_log /var/log/nginx/x402-demo.error.log warn;
    client_max_body_size 32k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = /work {
        limit_except POST { deny all; }
        proxy_pass http://x402_demo_mainnet;
        proxy_read_timeout 70s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name x402-demo-test.mikedotexe.com;

    ssl_certificate /etc/letsencrypt/live/x402-demo.mikedotexe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x402-demo.mikedotexe.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:x402_demo_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    access_log /var/log/nginx/x402-demo.access.log combined;
    error_log /var/log/nginx/x402-demo.error.log warn;
    client_max_body_size 32k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = /work {
        limit_except POST { deny all; }
        proxy_pass http://x402_demo_testnet;
        proxy_read_timeout 70s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
